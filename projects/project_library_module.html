<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="project_library_module.css">
</head>
<body>
    <header>
        <h1>Books Library</h1>
        <button id="addBookBtn">Add New Book</button>
    </header>

    <main>
        <div id="library-container">
            <!-- Books will be displayed here -->
        </div>
    </main>

    <dialog id="bookDialog">
        <form id="bookForm" method="dialog">
            <h2>Add New Book</h2>
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" required>
            </div>
            <div class="form-group">
                <label for="pages">Number of Pages:</label>
                <input type="number" id="pages" required min="1">
            </div>
            <div class="form-group-checkbox">
                <label for="isRead">Have you read it?</label>
                <input type="checkbox" id="isRead">
            </div>
            <div class="form-actions">
                <button type="button" id="cancelBtn">Cancel</button>
                <button type="submit" id="submitBtn">Add Book</button>
            </div>
        </form>
    </dialog>

    <script src="project_library_module.js"></script>
</body>
</html>
